<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>행복 네 컷</title>

  <style>
    :root {
      --card: #ffffff;
      --primary: #5b7cff;
      --primary-dark: #4668f0;
      --sub: #eef3ff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe4ff;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #eef3ff 0%, #f9fbff 100%);
      color: var(--text);
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .camera-layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 16px;
      align-items: start;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #111;

      /* 촬영 미리보기에서만 거울보기처럼 보이게 함 */
      transform: scaleX(-1);
    }

    .guide-badge {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 2;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .count-overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 92px;
      font-weight: 800;
      background: rgba(0, 0, 0, 0.18);
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .count-overlay.show {
      display: flex;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mode-buttons {
      display: grid;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-mode {
      background: var(--sub);
      color: #3049b7;
      border: 1px solid #dce4ff;
    }

    .btn-mode.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-main {
      background: var(--primary);
      color: #fff;
    }

    .btn-main:hover {
      background: var(--primary-dark);
    }

    .btn-sub {
      background: #eef2f7;
      color: #334155;
      border: 1px solid var(--border);
    }

    .capture-card {
      border: 2px solid #c9d6ff;
    }

    .capture-card .btn-main {
      font-size: 18px;
      padding: 18px 16px;
      border-radius: 18px;
    }

    .status-box {
      border: 1px dashed #cdd8ee;
      background: #f8fbff;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      color: #3b4b66;
      line-height: 1.7;
    }

    .status-box strong {
      color: #1e2f5c;
    }

    .thumbs-wrap {
      margin-top: 18px;
    }

    .thumbs-title {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #e9eef8;
      border: 2px dashed #cdd8ee;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #718198;
      font-size: 13px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .error-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff1f2;
      color: #9f1239;
      border: 1px solid #fecdd3;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }

    .error-box.show {
      display: block;
    }

    .editor-card {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .preview-stage {
      position: relative;
      width: min(100%, 760px);
      margin: 0 auto;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: #dfe8ff;
      isolation: isolate;
    }

    .photo-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .slot {
      position: absolute;
      overflow: hidden;
      background: transparent;
    }

    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.08);
      transform-origin: center center;
    }

    .frame-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 2;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .editor-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notice {
      margin-top: 4px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
    }

    canvas {
      display: none;
    }

    .mobile-sticky-actions {
      display: none;
    }

    @media (max-width: 860px) {
      .app {
        padding: 12px 10px calc(132px + env(safe-area-inset-bottom));
      }

      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 13px;
        margin-bottom: 12px;
      }

      .camera-layout {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .video-wrap {
        height: min(58svh, 520px);
        aspect-ratio: auto;
        border-radius: 18px;
      }

      .right-panel {
        gap: 14px;
      }

      .capture-card {
        order: 1;
      }

      .mode-card {
        order: 2;
      }

      .status-box {
        order: 3;
      }

      .capture-card .btn-main {
        font-size: 20px;
        padding: 20px 16px;
      }

      .mobile-sticky-actions {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        z-index: 999;
        display: none;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid #dbe4ff;
        box-shadow: 0 12px 36px rgba(31, 41, 55, 0.22);
        backdrop-filter: blur(12px);
      }

      body.camera-active .mobile-sticky-actions {
        display: flex;
      }

      body.editor-active .mobile-sticky-actions {
        display: none;
      }

      .mobile-main-btn {
        flex: 1;
        font-size: 19px;
        padding: 18px 14px;
        border-radius: 18px;
      }

      .mobile-reset-btn {
        width: 88px;
        padding: 18px 10px;
        border-radius: 18px;
      }

      .mobile-count {
        min-width: 46px;
        text-align: center;
        font-weight: 800;
        color: #26355f;
      }

      .thumbs {
        gap: 8px;
      }
    }
  </style>
</head>

<body class="camera-active">
  <div class="app">
    <h1>행복 네 컷</h1>
    <p class="subtitle">카메라로 4장을 촬영하고 배경 프레임에 자동 합성해 보세요.</p>

    <section id="cameraScreen" class="screen active">
      <div class="card">
        <div class="camera-layout">
          <div>
            <div class="video-wrap">
              <div class="guide-badge" id="guideText">촬영 모드: 수동 촬영</div>
              <video id="video" autoplay playsinline muted></video>
              <div id="countOverlay" class="count-overlay">3</div>
            </div>
            <div id="errorBox" class="error-box"></div>
          </div>

          <div class="right-panel">
  <!-- 촬영 박스를 먼저 배치 -->
  <div class="card" style="padding:14px;">
    <h3 style="margin:0 0 12px; font-size:17px;">촬영</h3>
    <button id="captureBtn" class="btn btn-main" style="width:100%; margin-bottom:10px;">
      사진 촬영
    </button>
    <button id="resetBtn" class="btn btn-sub" style="width:100%;">
      촬영 초기화
    </button>
  </div>

  <!-- 촬영 방식 선택 박스를 아래로 이동 -->
  <div class="card" style="padding:14px;">
    <h3 style="margin:0 0 12px; font-size:17px;">촬영 방식 선택</h3>
    <div class="mode-buttons">
      <button class="btn btn-mode active" data-mode="manual">수동 촬영</button>
      <button class="btn btn-mode" data-mode="1">1초 자동촬영</button>
      <button class="btn btn-mode" data-mode="3">3초 자동촬영</button>
    </div>
  </div>

  <div class="status-box">
    <strong>진행 상황</strong><br />
    현재 촬영 수: <span id="shotCount">0</span> / 4<br />
    선택 모드: <span id="modeLabel">수동 촬영</span><br />
    자동촬영은 시작 후 4장이 연속으로 촬영됩니다.
  </div>
</div>

        <div class="thumbs-wrap">
          <h3 class="thumbs-title">촬영된 사진</h3>
          <div id="thumbs" class="thumbs">
            <div class="thumb">1번</div>
            <div class="thumb">2번</div>
            <div class="thumb">3번</div>
            <div class="thumb">4번</div>
          </div>
        </div>
      </div>
    </section>

    <section id="editorScreen" class="screen">
      <div class="card editor-card">
        <div id="previewStage" class="preview-stage" aria-label="행복 네 컷 미리보기">
          <div id="photoLayer" class="photo-layer"></div>
          <img id="frameLayer" class="frame-layer" src="background.png" alt="행복 네 컷 배경 프레임" />
        </div>

        <div class="editor-actions">
          <button id="downloadBtn" class="btn btn-main">이미지 다운로드</button>
          <button id="retakeBtn" class="btn btn-sub">다시 촬영</button>
        </div>

        <p class="notice">
          촬영 화면은 거울보기처럼 보이지만, 저장되는 사진과 최종 이미지는 정상 방향으로 저장됩니다.
        </p>
      </div>
    </section>

    <canvas id="captureCanvas"></canvas>
  </div>

  <div id="mobileStickyActions" class="mobile-sticky-actions">
    <button id="mobileCaptureBtn" class="btn btn-main mobile-main-btn">사진 촬영</button>
    <button id="mobileResetBtn" class="btn btn-sub mobile-reset-btn">초기화</button>
    <div class="mobile-count"><span id="mobileShotCount">0</span>/4</div>
  </div>

  <script>
    const BASE_W = 1448;
    const BASE_H = 2048;

    const RAW_SLOTS = [
      { x: 81,  y: 450,  w: 609, h: 740 },
      { x: 80,  y: 1226, w: 606, h: 743 },
      { x: 770, y: 91,   w: 609, h: 740 },
      { x: 769, y: 863,  w: 609, h: 742 },
    ];

    const OVERFILL_RATIO = 0.10;

    const SLOT_CONFIG = RAW_SLOTS.map(slot => ({
      x: slot.x / BASE_W,
      y: slot.y / BASE_H,
      w: slot.w / BASE_W,
      h: slot.h / BASE_H
    }));

    const video = document.getElementById("video");
    const captureBtn = document.getElementById("captureBtn");
    const resetBtn = document.getElementById("resetBtn");
    const mobileCaptureBtn = document.getElementById("mobileCaptureBtn");
    const mobileResetBtn = document.getElementById("mobileResetBtn");
    const mobileShotCount = document.getElementById("mobileShotCount");

    const retakeBtn = document.getElementById("retakeBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const shotCountEl = document.getElementById("shotCount");
    const modeLabelEl = document.getElementById("modeLabel");
    const guideText = document.getElementById("guideText");
    const thumbs = document.getElementById("thumbs");
    const countOverlay = document.getElementById("countOverlay");
    const errorBox = document.getElementById("errorBox");

    const cameraScreen = document.getElementById("cameraScreen");
    const editorScreen = document.getElementById("editorScreen");
    const previewStage = document.getElementById("previewStage");
    const photoLayer = document.getElementById("photoLayer");

    const captureCanvas = document.getElementById("captureCanvas");
    const capCtx = captureCanvas.getContext("2d");

    const modeButtons = document.querySelectorAll(".btn-mode");

    let stream = null;
    let shots = [];
    let currentMode = "manual";
    let isCapturing = false;
    let audioCtx = null;

    const bgImage = new Image();
    bgImage.src = "background.png";

    function unlockAudio() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;

        if (!audioCtx) {
          audioCtx = new AudioContext();
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
      } catch (e) {
        console.warn("오디오 초기화 실패:", e);
      }
    }

    function playShutterSound() {
      try {
        unlockAudio();
        if (!audioCtx) return;

        const now = audioCtx.currentTime;

        const masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.0001, now);
        masterGain.gain.exponentialRampToValueAtTime(0.6, now + 0.01);
        masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
        masterGain.connect(audioCtx.destination);

        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();

        osc1.type = "square";
        osc1.frequency.setValueAtTime(1200, now);

        gain1.gain.setValueAtTime(0.0001, now);
        gain1.gain.exponentialRampToValueAtTime(0.45, now + 0.005);
        gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);

        osc1.connect(gain1);
        gain1.connect(masterGain);

        osc1.start(now);
        osc1.stop(now + 0.05);

        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();

        osc2.type = "triangle";
        osc2.frequency.setValueAtTime(700, now + 0.06);

        gain2.gain.setValueAtTime(0.0001, now + 0.06);
        gain2.gain.exponentialRampToValueAtTime(0.35, now + 0.065);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

        osc2.connect(gain2);
        gain2.connect(masterGain);

        osc2.start(now + 0.06);
        osc2.stop(now + 0.15);
      } catch (e) {
        console.warn("셔터 소리 재생 실패:", e);
      }
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("show");
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.classList.remove("show");
    }

    function updateStatus() {
      shotCountEl.textContent = shots.length;
      mobileShotCount.textContent = shots.length;

      const modeText =
        currentMode === "manual"
          ? "수동 촬영"
          : `${currentMode}초 자동촬영`;

      const captureText =
        currentMode === "manual"
          ? "사진 촬영"
          : `${currentMode}초 자동촬영 시작`;

      modeLabelEl.textContent = modeText;
      guideText.textContent = `촬영 모드: ${modeText}`;
      captureBtn.textContent = captureText;
      mobileCaptureBtn.textContent = captureText;

      renderThumbs();
    }

    function setButtonsDisabled(disabled) {
      captureBtn.disabled = disabled;
      resetBtn.disabled = disabled;
      mobileCaptureBtn.disabled = disabled;
      mobileResetBtn.disabled = disabled;
    }

    function renderThumbs() {
      thumbs.innerHTML = "";

      for (let i = 0; i < 4; i++) {
        const box = document.createElement("div");
        box.className = "thumb";

        if (shots[i]) {
          const img = document.createElement("img");
          img.src = shots[i];
          img.alt = `${i + 1}번 촬영 사진`;
          box.appendChild(img);
        } else {
          box.textContent = `${i + 1}번`;
        }

        thumbs.appendChild(box);
      }
    }

    function setMode(mode) {
      currentMode = mode;

      modeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });

      updateStatus();
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    async function startCamera() {
      hideError();
      stopCamera();

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1080 },
            height: { ideal: 1440 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
      } catch (err) {
        console.error(err);
        showError(
          "카메라를 사용할 수 없습니다. 브라우저의 카메라 권한을 허용했는지 확인해 주세요. GitHub Pages 또는 HTTPS 환경에서 실행하는 것이 좋습니다."
        );
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function showCountdown(seconds) {
      for (let i = seconds; i >= 1; i--) {
        countOverlay.textContent = i;
        countOverlay.classList.add("show");
        await wait(1000);
      }

      countOverlay.classList.remove("show");
    }

    function capturePhoto() {
      if (!video.videoWidth || !video.videoHeight) {
        showError("카메라 영상이 아직 준비되지 않았습니다. 잠시 후 다시 시도해 주세요.");
        return null;
      }

      const vw = video.videoWidth;
      const vh = video.videoHeight;

      captureCanvas.width = vw;
      captureCanvas.height = vh;

      capCtx.clearRect(0, 0, vw, vh);

      /*
        중요:
        video 태그는 CSS로만 좌우반전되어 보입니다.
        캔버스에는 원본 video를 그대로 그리므로 저장 결과물은 정상 방향입니다.
      */
      capCtx.drawImage(video, 0, 0, vw, vh);

      playShutterSound();

      return captureCanvas.toDataURL("image/png");
    }

    function switchToEditor() {
      cameraScreen.classList.remove("active");
      editorScreen.classList.add("active");

      document.body.classList.remove("camera-active");
      document.body.classList.add("editor-active");

      buildPreview();
    }

    function switchToCamera() {
      editorScreen.classList.remove("active");
      cameraScreen.classList.add("active");

      document.body.classList.remove("editor-active");
      document.body.classList.add("camera-active");

      startCamera();
    }

    function buildPreview() {
      photoLayer.innerHTML = "";

      if (bgImage.naturalWidth && bgImage.naturalHeight) {
        previewStage.style.aspectRatio = `${bgImage.naturalWidth} / ${bgImage.naturalHeight}`;
      }

      SLOT_CONFIG.forEach((slot, index) => {
        const slotBox = document.createElement("div");
        slotBox.className = "slot";

        slotBox.style.left = `${slot.x * 100}%`;
        slotBox.style.top = `${slot.y * 100}%`;
        slotBox.style.width = `${slot.w * 100}%`;
        slotBox.style.height = `${slot.h * 100}%`;

        const img = document.createElement("img");
        img.src = shots[index];
        img.alt = `촬영 사진 ${index + 1}`;

        slotBox.appendChild(img);
        photoLayer.appendChild(slotBox);
      });
    }

    function resetShots() {
      shots = [];
      updateStatus();
    }

    async function handleManualCapture() {
      if (isCapturing || shots.length >= 4) return;

      const photo = capturePhoto();
      if (!photo) return;

      shots.push(photo);
      updateStatus();

      if (shots.length === 4) {
        switchToEditor();
      }
    }

    async function handleAutoCapture(intervalSec) {
      if (isCapturing || shots.length >= 4) return;

      isCapturing = true;
      setButtonsDisabled(true);

      try {
        while (shots.length < 4) {
          await showCountdown(intervalSec);

          const photo = capturePhoto();
          if (!photo) break;

          shots.push(photo);
          updateStatus();

          if (shots.length >= 4) break;
        }

        if (shots.length === 4) {
          switchToEditor();
        }
      } finally {
        isCapturing = false;
        setButtonsDisabled(false);
        countOverlay.classList.remove("show");
      }
    }

    async function handleCaptureClick() {
      unlockAudio();
      hideError();

      if (shots.length >= 4) {
        alert("이미 4장의 사진이 촬영되었습니다. 다시 촬영하려면 초기화해 주세요.");
        return;
      }

      if (currentMode === "manual") {
        await handleManualCapture();
      } else {
        await handleAutoCapture(Number(currentMode));
      }
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawImageCover(ctx, img, x, y, w, h) {
      const imgRatio = img.width / img.height;
      const boxRatio = w / h;

      let sx, sy, sw, sh;

      if (imgRatio > boxRatio) {
        sh = img.height;
        sw = sh * boxRatio;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = sw / boxRatio;
        sx = 0;
        sy = (img.height - sh) / 2;
      }

      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function getTimestampForFileName() {
      const now = new Date();

      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mi = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");

      return `${yyyy}${mm}${dd}_${hh}${mi}${ss}`;
    }

    async function downloadComposite() {
      if (!bgImage.complete || !bgImage.naturalWidth || !bgImage.naturalHeight) {
        alert("배경 이미지를 아직 불러오지 못했습니다.");
        return;
      }

      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = bgImage.naturalWidth;
      finalCanvas.height = bgImage.naturalHeight;

      const ctx = finalCanvas.getContext("2d");

      for (let i = 0; i < SLOT_CONFIG.length; i++) {
        const slot = SLOT_CONFIG[i];
        const src = shots[i];

        if (!src) continue;

        const img = await loadImage(src);

        const x = slot.x * finalCanvas.width;
        const y = slot.y * finalCanvas.height;
        const w = slot.w * finalCanvas.width;
        const h = slot.h * finalCanvas.height;

        const extraW = w * OVERFILL_RATIO;
        const extraH = h * OVERFILL_RATIO;

        drawImageCover(
          ctx,
          img,
          x - extraW / 2,
          y - extraH / 2,
          w + extraW,
          h + extraH
        );
      }

      ctx.drawImage(bgImage, 0, 0, finalCanvas.width, finalCanvas.height);

      const link = document.createElement("a");
      link.href = finalCanvas.toDataURL("image/png");
      link.download = `행복네컷_${getTimestampForFileName()}.png`;
      link.click();
    }

    modeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (isCapturing) return;
        setMode(btn.dataset.mode);
      });
    });

    captureBtn.addEventListener("click", handleCaptureClick);
    mobileCaptureBtn.addEventListener("click", handleCaptureClick);

    resetBtn.addEventListener("click", () => {
      if (isCapturing) return;
      resetShots();
    });

    mobileResetBtn.addEventListener("click", () => {
      if (isCapturing) return;
      resetShots();
    });

    retakeBtn.addEventListener("click", () => {
      resetShots();
      switchToCamera();
    });

    downloadBtn.addEventListener("click", downloadComposite);

    bgImage.onload = () => {
      if (bgImage.naturalWidth && bgImage.naturalHeight) {
        previewStage.style.aspectRatio = `${bgImage.naturalWidth} / ${bgImage.naturalHeight}`;
      }
    };

    window.addEventListener("load", async () => {
      renderThumbs();
      updateStatus();

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError("이 브라우저는 카메라 기능을 지원하지 않습니다.");
        return;
      }

      await startCamera();
    });

    window.addEventListener("beforeunload", () => {
      stopCamera();
    });
  </script>
</body>
</html>
