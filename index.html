<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>행복 네 컷</title>
  <style>
    :root {
      --bg: #f5f7ff;
      --card: #ffffff;
      --primary: #5b7cff;
      --primary-dark: #4668f0;
      --sub: #eef3ff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe4ff;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #eef3ff 0%, #f9fbff 100%);
      color: var(--text);
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .camera-layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 860px) {
      .camera-layout {
        grid-template-columns: 1fr;
      }
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .guide-badge {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 2;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .count-overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 92px;
      font-weight: 800;
      background: rgba(0, 0, 0, 0.18);
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .count-overlay.show {
      display: flex;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mode-buttons {
      display: grid;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-mode {
      background: var(--sub);
      color: #3049b7;
      border: 1px solid #dce4ff;
    }

    .btn-mode.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-main {
      background: var(--primary);
      color: #fff;
    }

    .btn-main:hover {
      background: var(--primary-dark);
    }

    .btn-sub {
      background: #eef2f7;
      color: #334155;
      border: 1px solid var(--border);
    }

    .status-box {
      border: 1px dashed #cdd8ee;
      background: #f8fbff;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      color: #3b4b66;
      line-height: 1.7;
    }

    .status-box strong {
      color: #1e2f5c;
    }

    .thumbs-wrap {
      margin-top: 18px;
    }

    .thumbs-title {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #e9eef8;
      border: 2px dashed #cdd8ee;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #718198;
      font-size: 13px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .error-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff1f2;
      color: #9f1239;
      border: 1px solid #fecdd3;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }

    .error-box.show {
      display: block;
    }

    .editor-card {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .preview-stage {
      position: relative;
      width: min(100%, 760px);
      margin: 0 auto;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: #dfe8ff;
      isolation: isolate;
    }

    .photo-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .slot {
      position: absolute;
      overflow: hidden;
      background: transparent;
    }

    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.08); /* 사진을 조금 키워 검정 여백 방지 */
      transform-origin: center center;
    }

    .frame-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 2;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .editor-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notice {
      margin-top: 4px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>행복 네 컷</h1>
    <p class="subtitle">카메라로 4장을 촬영하고 배경 프레임에 자동 합성해 보세요.</p>

    <!-- 촬영 화면 -->
    <section id="cameraScreen" class="screen active">
      <div class="card">
        <div class="camera-layout">
          <div>
            <div class="video-wrap">
              <div class="guide-badge" id="guideText">촬영 모드: 수동 촬영</div>
              <video id="video" autoplay playsinline muted></video>
              <div id="countOverlay" class="count-overlay">3</div>
            </div>
            <div id="errorBox" class="error-box"></div>
          </div>

          <div class="right-panel">
            <div class="card" style="padding:14px;">
              <h3 style="margin:0 0 12px; font-size:17px;">촬영 방식 선택</h3>
              <div class="mode-buttons">
                <button class="btn btn-mode active" data-mode="manual">수동 촬영</button>
                <button class="btn btn-mode" data-mode="1">1초 자동촬영</button>
                <button class="btn btn-mode" data-mode="3">3초 자동촬영</button>
              </div>
            </div>

            <div class="card" style="padding:14px;">
              <h3 style="margin:0 0 12px; font-size:17px;">촬영</h3>
              <button id="captureBtn" class="btn btn-main" style="width:100%; margin-bottom:10px;">
                사진 촬영
              </button>
              <button id="resetBtn" class="btn btn-sub" style="width:100%;">
                촬영 초기화
              </button>
            </div>

            <div class="status-box">
              <strong>진행 상황</strong><br />
              현재 촬영 수: <span id="shotCount">0</span> / 4<br />
              선택 모드: <span id="modeLabel">수동 촬영</span><br />
              자동촬영은 시작 후 4장이 연속으로 촬영됩니다.
            </div>
          </div>
        </div>

        <div class="thumbs-wrap">
          <h3 class="thumbs-title">촬영된 사진</h3>
          <div id="thumbs" class="thumbs">
            <div class="thumb">1번</div>
            <div class="thumb">2번</div>
            <div class="thumb">3번</div>
            <div class="thumb">4번</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 편집 화면 -->
    <section id="editorScreen" class="screen">
      <div class="card editor-card">
        <div id="previewStage" class="preview-stage" aria-label="행복 네 컷 미리보기">
          <div id="photoLayer" class="photo-layer"></div>
          <img id="frameLayer" class="frame-layer" src="background.png" alt="행복 네 컷 배경 프레임" />
        </div>

        <div class="editor-actions">
          <button id="downloadBtn" class="btn btn-main">이미지 다운로드</button>
          <button id="retakeBtn" class="btn btn-sub">다시 촬영</button>
        </div>

        <p class="notice">
          사진은 프레임보다 약간 크게 배치되어, 슬롯 가장자리의 검정 여백이 보이지 않도록 처리됩니다.
        </p>
      </div>
    </section>

    <canvas id="captureCanvas"></canvas>
  </div>

  <script>
    /*********************************************************
     * 실제 배경 이미지 기준 슬롯 좌표(픽셀)
     * 이전 비율 좌표보다 실제 슬롯 위치에 더 맞춘 값
     *********************************************************/
    const BASE_W = 1448;
    const BASE_H = 2048;

    const RAW_SLOTS = [
      { x: 81,  y: 450,  w: 609, h: 740 }, // 왼쪽 위
      { x: 80,  y: 1226, w: 606, h: 743 }, // 왼쪽 아래
      { x: 770, y: 91,   w: 609, h: 740 }, // 오른쪽 위
      { x: 769, y: 863,  w: 609, h: 742 }, // 오른쪽 아래
    ];

    // 다운로드용 사진 확대 비율
    const OVERFILL_RATIO = 0.10; // 10% 확대

    const SLOT_CONFIG = RAW_SLOTS.map(slot => ({
      x: slot.x / BASE_W,
      y: slot.y / BASE_H,
      w: slot.w / BASE_W,
      h: slot.h / BASE_H
    }));

    const video = document.getElementById("video");
    const captureBtn = document.getElementById("captureBtn");
    const resetBtn = document.getElementById("resetBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const shotCountEl = document.getElementById("shotCount");
    const modeLabelEl = document.getElementById("modeLabel");
    const guideText = document.getElementById("guideText");
    const thumbs = document.getElementById("thumbs");
    const countOverlay = document.getElementById("countOverlay");
    const errorBox = document.getElementById("errorBox");

    const cameraScreen = document.getElementById("cameraScreen");
    const editorScreen = document.getElementById("editorScreen");
    const previewStage = document.getElementById("previewStage");
    const photoLayer = document.getElementById("photoLayer");
    const frameLayer = document.getElementById("frameLayer");

    const captureCanvas = document.getElementById("captureCanvas");
    const capCtx = captureCanvas.getContext("2d");

    const modeButtons = document.querySelectorAll(".btn-mode");

    let stream = null;
    let shots = [];
    let currentMode = "manual"; // manual, 1, 3
    let isCapturing = false;

    const bgImage = new Image();
    bgImage.src = "background.png";

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("show");
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.classList.remove("show");
    }

    function updateStatus() {
      shotCountEl.textContent = shots.length;

      const modeText =
        currentMode === "manual"
          ? "수동 촬영"
          : `${currentMode}초 자동촬영`;

      modeLabelEl.textContent = modeText;
      guideText.textContent = `촬영 모드: ${modeText}`;
      captureBtn.textContent = currentMode === "manual" ? "사진 촬영" : "자동촬영 시작";

      renderThumbs();
    }

    function renderThumbs() {
      thumbs.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const box = document.createElement("div");
        box.className = "thumb";

        if (shots[i]) {
          const img = document.createElement("img");
          img.src = shots[i];
          img.alt = `${i + 1}번 촬영 사진`;
          box.appendChild(img);
        } else {
          box.textContent = `${i + 1}번`;
        }

        thumbs.appendChild(box);
      }
    }

    function setMode(mode) {
      currentMode = mode;
      modeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
      updateStatus();
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    async function startCamera() {
      hideError();
      stopCamera();

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1080 },
            height: { ideal: 1440 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
      } catch (err) {
        console.error(err);
        showError("카메라를 사용할 수 없습니다. 브라우저 카메라 권한을 허용했는지 확인해 주세요. GitHub Pages 또는 HTTPS 환경에서 실행하는 것이 좋습니다.");
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function showCountdown(seconds) {
      for (let i = seconds; i >= 1; i--) {
        countOverlay.textContent = i;
        countOverlay.classList.add("show");
        await wait(1000);
      }
      countOverlay.classList.remove("show");
    }

    function capturePhoto() {
      if (!video.videoWidth || !video.videoHeight) {
        showError("카메라 영상이 아직 준비되지 않았습니다. 잠시 후 다시 시도해 주세요.");
        return null;
      }

      const vw = video.videoWidth;
      const vh = video.videoHeight;

      captureCanvas.width = vw;
      captureCanvas.height = vh;
      capCtx.clearRect(0, 0, vw, vh);
      capCtx.drawImage(video, 0, 0, vw, vh);

      return captureCanvas.toDataURL("image/png");
    }

    function switchToEditor() {
      cameraScreen.classList.remove("active");
      editorScreen.classList.add("active");
      buildPreview();
    }

    function switchToCamera() {
      editorScreen.classList.remove("active");
      cameraScreen.classList.add("active");
      startCamera();
    }

    function buildPreview() {
      photoLayer.innerHTML = "";

      if (bgImage.naturalWidth && bgImage.naturalHeight) {
        previewStage.style.aspectRatio = `${bgImage.naturalWidth} / ${bgImage.naturalHeight}`;
      }

      SLOT_CONFIG.forEach((slot, index) => {
        const slotBox = document.createElement("div");
        slotBox.className = "slot";
        slotBox.style.left = `${slot.x * 100}%`;
        slotBox.style.top = `${slot.y * 100}%`;
        slotBox.style.width = `${slot.w * 100}%`;
        slotBox.style.height = `${slot.h * 100}%`;

        const img = document.createElement("img");
        img.src = shots[index];
        img.alt = `촬영 사진 ${index + 1}`;
        slotBox.appendChild(img);
        photoLayer.appendChild(slotBox);
      });
    }

    function resetShots() {
      shots = [];
      updateStatus();
    }

    async function handleManualCapture() {
      if (isCapturing || shots.length >= 4) return;

      const photo = capturePhoto();
      if (!photo) return;

      shots.push(photo);
      updateStatus();

      if (shots.length === 4) {
        switchToEditor();
      }
    }

    async function handleAutoCapture(intervalSec) {
      if (isCapturing || shots.length >= 4) return;

      isCapturing = true;
      captureBtn.disabled = true;
      resetBtn.disabled = true;

      try {
        while (shots.length < 4) {
          await showCountdown(intervalSec);

          const photo = capturePhoto();
          if (!photo) break;

          shots.push(photo);
          updateStatus();

          if (shots.length >= 4) break;
        }

        if (shots.length === 4) {
          switchToEditor();
        }
      } finally {
        isCapturing = false;
        captureBtn.disabled = false;
        resetBtn.disabled = false;
        countOverlay.classList.remove("show");
      }
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawImageCover(ctx, img, x, y, w, h) {
      const imgRatio = img.width / img.height;
      const boxRatio = w / h;

      let sx, sy, sw, sh;

      if (imgRatio > boxRatio) {
        sh = img.height;
        sw = sh * boxRatio;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = sw / boxRatio;
        sx = 0;
        sy = (img.height - sh) / 2;
      }

      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function getTimestampForFileName() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mi = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      return `${yyyy}${mm}${dd}_${hh}${mi}${ss}`;
    }

    async function downloadComposite() {
      if (!bgImage.complete || !bgImage.naturalWidth || !bgImage.naturalHeight) {
        alert("배경 이미지를 아직 불러오지 못했습니다.");
        return;
      }

      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = bgImage.naturalWidth;
      finalCanvas.height = bgImage.naturalHeight;
      const ctx = finalCanvas.getContext("2d");

      for (let i = 0; i < SLOT_CONFIG.length; i++) {
        const slot = SLOT_CONFIG[i];
        const src = shots[i];
        if (!src) continue;

        const img = await loadImage(src);

        const x = slot.x * finalCanvas.width;
        const y = slot.y * finalCanvas.height;
        const w = slot.w * finalCanvas.width;
        const h = slot.h * finalCanvas.height;

        // 사진을 슬롯보다 조금 크게 그려 검정 여백 방지
        const extraW = w * OVERFILL_RATIO;
        const extraH = h * OVERFILL_RATIO;

        drawImageCover(
          ctx,
          img,
          x - extraW / 2,
          y - extraH / 2,
          w + extraW,
          h + extraH
        );
      }

      // 배경 프레임을 마지막에 그려서 사진 위에 덮음
      ctx.drawImage(bgImage, 0, 0, finalCanvas.width, finalCanvas.height);

      const link = document.createElement("a");
      link.href = finalCanvas.toDataURL("image/png");
      link.download = `행복네컷_${getTimestampForFileName()}.png`;
      link.click();
    }

    modeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (isCapturing) return;
        setMode(btn.dataset.mode);
      });
    });

    captureBtn.addEventListener("click", async () => {
      hideError();

      if (shots.length >= 4) {
        alert("이미 4장의 사진이 촬영되었습니다. 다시 촬영하려면 초기화해 주세요.");
        return;
      }

      if (currentMode === "manual") {
        handleManualCapture();
      } else {
        handleAutoCapture(Number(currentMode));
      }
    });

    resetBtn.addEventListener("click", () => {
      if (isCapturing) return;
      resetShots();
    });

    retakeBtn.addEventListener("click", () => {
      resetShots();
      switchToCamera();
    });

    downloadBtn.addEventListener("click", downloadComposite);

    bgImage.onload = () => {
      if (bgImage.naturalWidth && bgImage.naturalHeight) {
        previewStage.style.aspectRatio = `${bgImage.naturalWidth} / ${bgImage.naturalHeight}`;
      }
    };

    window.addEventListener("load", async () => {
      renderThumbs();
      updateStatus();

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError("이 브라우저는 카메라 기능을 지원하지 않습니다.");
        return;
      }

      await startCamera();
    });

    window.addEventListener("beforeunload", () => {
      stopCamera();
    });
  </script>
</body>
</html>
