<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>행복 네 컷</title>

  <style>
    :root {
      --card: #151a2f;
      --primary: #8b9cff;
      --primary-dark: #6f82ff;
      --sub: #222a45;
      --text: #f8fafc;
      --muted: #aeb8d4;
      --border: #2f3a5f;
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.45);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139, 156, 255, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 79, 163, 0.16), transparent 34%),
        linear-gradient(180deg, #080b16 0%, #101426 52%, #080b16 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 12px 40px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .title-hero {
      position: relative;
      width: min(100%, 760px);
      margin: 0 auto 16px;
      padding: 22px 16px 20px;
      border-radius: 28px;
      text-align: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.16), transparent 25%),
        radial-gradient(circle at 82% 12%, rgba(255, 215, 120, 0.22), transparent 22%),
        linear-gradient(135deg, #25113f 0%, #1f2d68 45%, #0f4d55 100%);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.48),
        0 0 28px rgba(139, 156, 255, 0.2),
        inset 0 0 0 2px rgba(255, 255, 255, 0.12);
    }

    .title-hero::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 22px;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      pointer-events: none;
    }

    .title-hero::after {
      content: "★ ★ ★";
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      letter-spacing: 8px;
    }

    .title-badge {
      position: relative;
      z-index: 2;
      display: inline-block;
      margin-bottom: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #dbe4ff;
      font-size: 14px;
      font-weight: 800;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
    }

    .fancy-title {
      position: relative;
      z-index: 2;
      margin: 0;
      font-size: clamp(34px, 7vw, 58px);
      font-weight: 950;
      line-height: 1.05;
      letter-spacing: -1px;
      color: #ffffff;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.38),
        0 0 18px rgba(139, 156, 255, 0.55),
        0 6px 18px rgba(0, 0, 0, 0.55);
    }

    .fancy-title span {
      display: inline-block;
    }

    .title-photo {
      margin-left: 8px;
      padding: 4px 14px 7px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      color: #e5439a;
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.38),
        0 0 22px rgba(255, 79, 163, 0.35),
        inset 0 -4px 0 rgba(255, 205, 226, 0.9);
      transform: rotate(-3deg);
    }

    .subtitle {
      position: relative;
      z-index: 2;
      margin: 12px 0 0;
      color: rgba(245, 247, 255, 0.92);
      font-size: 15px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
    }

    .sparkle {
      position: absolute;
      z-index: 1;
      font-size: 34px;
      animation: floatSparkle 2.4s ease-in-out infinite;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.45));
    }

    .sparkle-left {
      left: 18px;
      top: 20px;
    }

    .sparkle-right {
      right: 20px;
      top: 24px;
      animation-delay: 0.8s;
    }

    @keyframes floatSparkle {
      0%, 100% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      50% {
        transform: translateY(-8px) rotate(8deg) scale(1.12);
      }
    }

    .camera-main {
      width: min(100%, 760px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: linear-gradient(180deg, var(--card) 0%, #11172a 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
      transform: scaleX(-1);
    }

    .guide-badge {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 5;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
    }

    .count-overlay {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 92px;
      font-weight: 900;
      background: rgba(0, 0, 0, 0.25);
      text-shadow:
        0 0 20px rgba(139, 156, 255, 0.75),
        0 6px 22px rgba(0, 0, 0, 0.7);
      pointer-events: none;
    }

    .count-overlay.show {
      display: flex;
    }

    .shutter-area {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 28px;
      z-index: 12;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .shutter-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 10px solid rgba(255, 255, 255, 0.32);
      background: #ff3147;
      cursor: pointer;
      pointer-events: auto;
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.48),
        0 0 0 8px rgba(0, 0, 0, 0.22),
        inset 0 0 0 2px rgba(255, 255, 255, 0.16);
      transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
    }

    .shutter-btn:hover {
      transform: scale(1.04);
      filter: brightness(1.08);
    }

    .shutter-btn:active {
      transform: scale(0.94);
    }

    .shutter-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .capture-card {
      padding: 14px;
    }

    .capture-card h3,
    .mode-card h3 {
      margin: 0 0 12px;
      font-size: 17px;
      color: #f8fafc;
    }

    .reset-only-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-main {
      background: linear-gradient(135deg, #8b9cff 0%, #ff6db2 100%);
      color: #fff;
      box-shadow: 0 10px 24px rgba(139, 156, 255, 0.28);
    }

    .btn-sub {
      background: #202842;
      color: #e5e7eb;
      border: 1px solid #3a4568;
    }

    .reset-btn {
      width: 100%;
      padding: 16px 14px;
      border-radius: 16px;
      font-size: 16px;
    }

    .shot-mini {
      min-width: 58px;
      text-align: center;
      font-weight: 900;
      color: #dbe4ff;
      font-size: 17px;
    }

    .mode-card {
      padding: 14px;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .btn-mode {
      background: #202842;
      color: #cdd7ff;
      border: 1px solid #384464;
    }

    .btn-mode.active {
      background: linear-gradient(135deg, #697dff 0%, #8b9cff 100%);
      color: #fff;
      border-color: #9aa8ff;
      box-shadow: 0 0 18px rgba(139, 156, 255, 0.28);
    }

    .status-box {
      border: 1px dashed #46537c;
      background: rgba(21, 26, 47, 0.78);
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .status-box strong {
      color: #ffffff;
    }

    .thumbs-wrap {
      margin-top: 2px;
    }

    .thumbs-title {
      margin: 0 0 10px;
      font-size: 16px;
      color: #f8fafc;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #202842;
      border: 2px dashed #46537c;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 13px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .error-box {
      padding: 12px 14px;
      border-radius: 12px;
      background: #3b111c;
      color: #fecdd3;
      border: 1px solid #7f1d1d;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }

    .error-box.show {
      display: block;
    }

    .editor-card {
      width: min(100%, 760px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .preview-stage {
      position: relative;
      width: 100%;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: #050712;
      isolation: isolate;
    }

    .photo-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .slot {
      position: absolute;
      overflow: hidden;
      background: transparent;
    }

    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.08);
      transform-origin: center center;
    }

    .frame-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 2;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .editor-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notice {
      margin-top: 4px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
    }

    canvas {
      display: none;
    }

    @media (max-width: 860px) {
      .app {
        padding: 10px 8px 32px;
      }

      .title-hero {
        margin-bottom: 12px;
        padding: 18px 12px 18px;
        border-radius: 24px;
      }

      .title-hero::before {
        inset: 7px;
        border-radius: 19px;
      }

      .title-badge {
        font-size: 13px;
        padding: 6px 12px;
      }

      .fancy-title {
        font-size: clamp(32px, 11vw, 46px);
      }

      .title-photo {
        margin-left: 4px;
        padding: 3px 10px 6px;
      }

      .subtitle {
        font-size: 13px;
      }

      .sparkle {
        font-size: 26px;
      }

      .sparkle-left {
        left: 12px;
        top: 18px;
      }

      .sparkle-right {
        right: 12px;
        top: 20px;
      }

      .video-wrap {
        aspect-ratio: 3 / 4;
        border-radius: 18px;
      }

      .shutter-area {
        bottom: 24px;
      }

      .shutter-btn {
        width: 86px;
        height: 86px;
        border-width: 9px;
        box-shadow:
          0 9px 24px rgba(0, 0, 0, 0.5),
          0 0 0 7px rgba(0, 0, 0, 0.24),
          inset 0 0 0 2px rgba(255, 255, 255, 0.16);
      }

      .reset-only-row {
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .reset-btn {
        padding: 15px 12px;
        font-size: 15px;
      }

      .shot-mini {
        min-width: 48px;
        font-size: 15px;
      }

      .mode-buttons {
        grid-template-columns: 1fr;
      }

      .thumbs {
        gap: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="title-hero">
      <div class="sparkle sparkle-left">✨</div>
      <div class="sparkle sparkle-right">💖</div>

      <div class="title-badge">📸 오늘의 추억 만들기</div>

      <h1 class="fancy-title">
        <span>행복</span>
        <span class="title-photo">네 컷</span>
      </h1>

      <p class="subtitle">
        친구들과 함께 찰칵! 나만의 행복 네 컷을 만들어 보세요.
      </p>
    </header>

    <section id="cameraScreen" class="screen active">
      <div class="camera-main">
        <div class="video-wrap">
          <div class="guide-badge" id="guideText">촬영 모드: 수동 촬영</div>
          <video id="video" autoplay playsinline muted></video>
          <div id="countOverlay" class="count-overlay">3</div>

          <div class="shutter-area">
            <button id="captureBtn" class="shutter-btn" aria-label="사진 촬영" title="사진 촬영"></button>
          </div>
        </div>

        <div id="errorBox" class="error-box"></div>

        <div class="card capture-card">
          <h3>촬영</h3>
          <div class="reset-only-row">
            <button id="resetBtn" class="btn btn-sub reset-btn">촬영 초기화</button>
            <div class="shot-mini"><span id="shotMiniCount">0</span>/4</div>
          </div>
        </div>

        <div class="card mode-card">
          <h3>촬영 방식 선택</h3>
          <div class="mode-buttons">
            <button class="btn btn-mode active" data-mode="manual">수동 촬영</button>
            <button class="btn btn-mode" data-mode="1">1초 자동촬영</button>
            <button class="btn btn-mode" data-mode="3">3초 자동촬영</button>
          </div>
        </div>

        <div class="status-box">
          <strong>진행 상황</strong><br />
          현재 촬영 수: <span id="shotCount">0</span> / 4<br />
          선택 모드: <span id="modeLabel">수동 촬영</span><br />
          자동촬영은 빨간 촬영 버튼을 누르면 시작됩니다.
        </div>

        <div class="card thumbs-wrap">
          <h3 class="thumbs-title">촬영된 사진</h3>
          <div id="thumbs" class="thumbs">
            <div class="thumb">1번</div>
            <div class="thumb">2번</div>
            <div class="thumb">3번</div>
            <div class="thumb">4번</div>
          </div>
        </div>
      </div>
    </section>

    <section id="editorScreen" class="screen">
      <div class="card editor-card">
        <div id="previewStage" class="preview-stage" aria-label="행복 네 컷 미리보기">
          <div id="photoLayer" class="photo-layer"></div>
          <img id="frameLayer" class="frame-layer" src="background.png" alt="행복 네 컷 배경 프레임" />
        </div>

        <div class="editor-actions">
          <button id="downloadBtn" class="btn btn-main">이미지 다운로드</button>
          <button id="retakeBtn" class="btn btn-sub">다시 촬영</button>
        </div>

        <p class="notice">
          미리보기 카메라 비율은 3:4, 카메라 줌은 가능한 경우 1배로 설정됩니다.
        </p>
      </div>
    </section>

    <canvas id="captureCanvas"></canvas>
  </div>

  <script>
    const BASE_W = 1448;
    const BASE_H = 2048;

    const RAW_SLOTS = [
      { x: 81,  y: 450,  w: 609, h: 740 },
      { x: 80,  y: 1226, w: 606, h: 743 },
      { x: 770, y: 91,   w: 609, h: 740 },
      { x: 769, y: 863,  w: 609, h: 742 },
    ];

    const OVERFILL_RATIO = 0.10;

    const SLOT_CONFIG = RAW_SLOTS.map(slot => ({
      x: slot.x / BASE_W,
      y: slot.y / BASE_H,
      w: slot.w / BASE_W,
      h: slot.h / BASE_H
    }));

    const video = document.getElementById("video");

    const captureBtn = document.getElementById("captureBtn");
    const resetBtn = document.getElementById("resetBtn");
    const shotMiniCount = document.getElementById("shotMiniCount");

    const retakeBtn = document.getElementById("retakeBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const shotCountEl = document.getElementById("shotCount");
    const modeLabelEl = document.getElementById("modeLabel");
    const guideText = document.getElementById("guideText");
    const thumbs = document.getElementById("thumbs");
    const countOverlay = document.getElementById("countOverlay");
    const errorBox = document.getElementById("errorBox");

    const cameraScreen = document.getElementById("cameraScreen");
    const editorScreen = document.getElementById("editorScreen");
    const previewStage = document.getElementById("previewStage");
    const photoLayer = document.getElementById("photoLayer");

    const captureCanvas = document.getElementById("captureCanvas");
    const capCtx = captureCanvas.getContext("2d");

    const modeButtons = document.querySelectorAll(".btn-mode");

    let stream = null;
    let shots = [];
    let currentMode = "manual";
    let isCapturing = false;
    let audioCtx = null;

    const bgImage = new Image();
    bgImage.src = "background.png";

    function unlockAudio() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;

        if (!audioCtx) {
          audioCtx = new AudioContext();
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
      } catch (e) {
        console.warn("오디오 초기화 실패:", e);
      }
    }

    function playShutterSound() {
      try {
        unlockAudio();
        if (!audioCtx) return;

        const now = audioCtx.currentTime;

        const masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.0001, now);
        masterGain.gain.exponentialRampToValueAtTime(0.6, now + 0.01);
        masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
        masterGain.connect(audioCtx.destination);

        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();

        osc1.type = "square";
        osc1.frequency.setValueAtTime(1200, now);

        gain1.gain.setValueAtTime(0.0001, now);
        gain1.gain.exponentialRampToValueAtTime(0.45, now + 0.005);
        gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);

        osc1.connect(gain1);
        gain1.connect(masterGain);

        osc1.start(now);
        osc1.stop(now + 0.05);

        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();

        osc2.type = "triangle";
        osc2.frequency.setValueAtTime(700, now + 0.06);

        gain2.gain.setValueAtTime(0.0001, now + 0.06);
        gain2.gain.exponentialRampToValueAtTime(0.35, now + 0.065);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

        osc2.connect(gain2);
        gain2.connect(masterGain);

        osc2.start(now + 0.06);
        osc2.stop(now + 0.15);
      } catch (e) {
        console.warn("셔터 소리 재생 실패:", e);
      }
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("show");
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.classList.remove("show");
    }

    function updateStatus() {
      shotCountEl.textContent = shots.length;
      shotMiniCount.textContent = shots.length;

      const modeText =
        currentMode === "manual"
          ? "수동 촬영"
          : `${currentMode}초 자동촬영`;

      const captureText =
        currentMode === "manual"
          ? "사진 촬영"
          : `${currentMode}초 자동촬영 시작`;

      modeLabelEl.textContent = modeText;
      guideText.textContent = `촬영 모드: ${modeText}`;
      captureBtn.setAttribute("aria-label", captureText);
      captureBtn.setAttribute("title", captureText);

      renderThumbs();
    }

    function setButtonsDisabled(disabled) {
      captureBtn.disabled = disabled;
      resetBtn.disabled = disabled;
    }

    function renderThumbs() {
      thumbs.innerHTML = "";

      for (let i = 0; i < 4; i++) {
        const box = document.createElement("div");
        box.className = "thumb";

        if (shots[i]) {
          const img = document.createElement("img");
          img.src = shots[i];
          img.alt = `${i + 1}번 촬영 사진`;
          box.appendChild(img);
        } else {
          box.textContent = `${i + 1}번`;
        }

        thumbs.appendChild(box);
      }
    }

    function setMode(mode) {
      currentMode = mode;

      modeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });

      updateStatus();
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    async function setCameraZoomToOne() {
      try {
        if (!stream) return;

        const track = stream.getVideoTracks()[0];
        if (!track) return;

        const capabilities = track.getCapabilities ? track.getCapabilities() : {};
        if ("zoom" in capabilities) {
          await track.applyConstraints({
            advanced: [{ zoom: 1 }]
          });
        }
      } catch (e) {
        console.warn("카메라 1배 줌 설정을 지원하지 않는 브라우저입니다.", e);
      }
    }

    async function startCamera() {
      hideError();
      stopCamera();

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1080 },
            height: { ideal: 1440 },
            aspectRatio: { ideal: 0.75 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        await setCameraZoomToOne();
      } catch (err) {
        console.error(err);
        showError(
          "카메라를 사용할 수 없습니다. 브라우저의 카메라 권한을 허용했는지 확인해 주세요. GitHub Pages 또는 HTTPS 환경에서 실행하는 것이 좋습니다."
        );
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function showCountdown(seconds) {
      for (let i = seconds; i >= 1; i--) {
        countOverlay.textContent = i;
        countOverlay.classList.add("show");
        await wait(1000);
      }

      countOverlay.classList.remove("show");
    }

    function capturePhoto() {
      if (!video.videoWidth || !video.videoHeight) {
        showError("카메라 영상이 아직 준비되지 않았습니다. 잠시 후 다시 시도해 주세요.");
        return null;
      }

      const vw = video.videoWidth;
      const vh = video.videoHeight;

      captureCanvas.width = vw;
      captureCanvas.height = vh;

      capCtx.clearRect(0, 0, vw, vh);

      /*
        미리보기 video만 CSS로 좌우반전되어 보입니다.
        캔버스에는 원본 영상을 그대로 그리므로 저장 결과물은 정상 방향입니다.
      */
      capCtx.drawImage(video, 0, 0, vw, vh);

      playShutterSound();

      return captureCanvas.toDataURL("image/png");
    }

    function switchToEditor() {
      cameraScreen.classList.remove("active");
      editorScreen.classList.add("active");
      buildPreview();
    }

    function switchToCamera() {
      editorScreen.classList.remove("active");
      cameraScreen.classList.add("active");
      startCamera();
    }

    function buildPreview() {
      photoLayer.innerHTML = "";

      if (bgImage.naturalWidth && bgImage.naturalHeight) {
        previewStage.style.aspectRatio = `${bgImage.naturalWidth} / ${bgImage.naturalHeight}`;
      }

      SLOT_CONFIG.forEach((slot, index) => {
        const slotBox = document.createElement("div");
        slotBox.className = "slot";

        slotBox.style.left = `${slot.x * 100}%`;
        slotBox.style.top = `${slot.y * 100}%`;
        slotBox.style.width = `${slot.w * 100}%`;
        slotBox.style.height = `${slot.h * 100}%`;

        const img = document.createElement("img");
        img.src = shots[index];
        img.alt = `촬영 사진 ${index + 1}`;

        slotBox.appendChild(img);
        photoLayer.appendChild(slotBox);
      });
    }

    function resetShots() {
      shots = [];
      updateStatus();
    }

    async function handleManualCapture() {
      if (isCapturing || shots.length >= 4) return;

      const photo = capturePhoto();
      if (!photo) return;

      shots.push(photo);
      updateStatus();

      if (shots.length === 4) {
        switchToEditor();
      }
    }

    async function handleAutoCapture(intervalSec) {
      if (isCapturing || shots.length >= 4) return;

      isCapturing = true;
      setButtonsDisabled(true);

      try {
        while (shots.length < 4) {
          await showCountdown(intervalSec);

          const photo = capturePhoto();
          if (!photo) break;

          shots.push(photo);
          updateStatus();

          if (shots.length >= 4) break;
        }

        if (shots.length === 4) {
          switchToEditor();
        }
      } finally {
        isCapturing = false;
        setButtonsDisabled(false);
        countOverlay.classList.remove("show");
      }
    }

    async function handleCaptureClick() {
      unlockAudio();
      hideError();

      if (shots.length >= 4) {
        alert("이미 4장의 사진이 촬영되었습니다. 다시 촬영하려면 초기화해 주세요.");
        return;
      }

      if (currentMode === "manual") {
        await handleManualCapture();
      } else {
        await handleAutoCapture(Number(currentMode));
      }
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawImageCover(ctx, img, x, y, w, h) {
      const imgRatio = img.width / img.height;
      const boxRatio = w / h;

      let sx, sy, sw, sh;

      if (imgRatio > boxRatio) {
        sh = img.height;
        sw = sh * boxRatio;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = sw / boxRatio;
        sx = 0;
        sy = (img.height - sh) / 2;
      }

      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function getTimestampForFileName() {
      const now = new Date();

      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mi = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");

      return `${yyyy}${mm}${dd}_${hh}${mi}${ss}`;
    }

    async function downloadComposite() {
      if (!bgImage.complete || !bgImage.naturalWidth || !bgImage.naturalHeight) {
        alert("배경 이미지를 아직 불러오지 못했습니다.");
        return;
      }

      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = bgImage.naturalWidth;
      finalCanvas.height = bgImage.naturalHeight;

      const ctx = finalCanvas.getContext("2d");

      for (let i = 0; i < SLOT_CONFIG.length; i++) {
        const slot = SLOT_CONFIG[i];
        const src = shots[i];

        if (!src) continue;

        const img = await loadImage(src);

        const x = slot.x * finalCanvas.width;
        const y = slot.y * finalCanvas.height;
        const w = slot.w * finalCanvas.width;
        const h = slot.h * finalCanvas.height;

        const extraW = w * OVERFILL_RATIO;
        const extraH = h * OVERFILL_RATIO;

        drawImageCover(
          ctx,
          img,
          x - extraW / 2,
          y - extraH / 2,
          w + extraW,
          h + extraH
        );
      }

      ctx.drawImage(bgImage, 0, 0, finalCanvas.width, finalCanvas.height);

      const link = document.createElement("a");
      link.href = finalCanvas.toDataURL("image/png");
      link.download = `행복네컷_${getTimestampForFileName()}.png`;
      link.click();
    }

    modeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (isCapturing) return;
        setMode(btn.dataset.mode);
      });
    });

    captureBtn.addEventListener("click", handleCaptureClick);

    resetBtn.addEventListener("click", () => {
      if (isCapturing) return;
      resetShots();
    });

    retakeBtn.addEventListener("click", () => {
      resetShots();
      switchToCamera();
    });

    downloadBtn.addEventListener("click", downloadComposite);

    bgImage.onload = () => {
      if (bgImage.naturalWidth && bgImage.naturalHeight) {
        previewStage.style.aspectRatio = `${bgImage.naturalWidth} / ${bgImage.naturalHeight}`;
      }
    };

    window.addEventListener("load", async () => {
      renderThumbs();
      updateStatus();

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError("이 브라우저는 카메라 기능을 지원하지 않습니다.");
        return;
      }

      await startCamera();
    });

    window.addEventListener("beforeunload", () => {
      stopCamera();
    });
  </script>
</body>
</html>
