<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>행복 네 컷</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: #f2f6ff;
      color: #1f2937;
    }
    .app {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    h1 {
      margin: 4px 0 6px;
      text-align: center;
      font-size: clamp(24px, 5vw, 34px);
    }
    .desc {
      margin: 0 0 16px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
      line-height: 1.5;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: #fff;
      border: 1px solid #dbe5f5;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    .camera-grid {
      display: grid;
      grid-template-columns: 1.25fr 0.85fr;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 820px) {
      .camera-grid { grid-template-columns: 1fr; }
    }
    .video-box {
      position: relative;
      width: 100%;
      aspect-ratio: 609 / 740;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #dbe5f5;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #000;
    }
    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 13px;
    }
    .count {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 3;
      background: rgba(0, 0, 0, 0.22);
      color: #fff;
      font-size: 88px;
      font-weight: 900;
      text-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
    }
    .count.show { display: grid; }
    .side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel-title {
      margin: 0 0 10px;
      font-size: 17px;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s, background 0.12s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }
    .btn-mode {
      margin-bottom: 8px;
      background: #eef2ff;
      color: #3349b8;
      border: 1px solid #dbe3ff;
    }
    .btn-mode.active {
      background: #5b7cff;
      color: white;
    }
    .btn-main {
      background: #5b7cff;
      color: white;
    }
    .btn-main:hover { background: #4868f0; }
    .btn-sub {
      background: #eef2f7;
      color: #334155;
      border: 1px solid #dbe5f5;
    }
    .info {
      margin-top: 2px;
      padding: 13px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px dashed #cbd5e1;
      color: #475569;
      font-size: 14px;
      line-height: 1.7;
    }
    .error {
      display: none;
      margin-top: 10px;
      padding: 12px 13px;
      border-radius: 12px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
      font-size: 14px;
      line-height: 1.5;
    }
    .error.show { display: block; }
    .thumbs-title {
      margin: 18px 0 10px;
      font-size: 16px;
    }
    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .thumb {
      aspect-ratio: 609 / 740;
      border-radius: 12px;
      overflow: hidden;
      background: #edf2fb;
      border: 2px dashed #cbd5e1;
      display: grid;
      place-items: center;
      color: #64748b;
      font-size: 13px;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 편집 화면 */
    .editor-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    .preview-stage {
      position: relative;
      width: min(100%, 760px);
      aspect-ratio: 1448 / 2048;
      overflow: hidden;
      border-radius: 28px;
      background: transparent;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      isolation: isolate;
    }
    .photo-layer,
    .frame-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .photo-layer { z-index: 1; }
    .frame-layer {
      z-index: 2;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .slot {
      position: absolute;
      overflow: hidden;
      background: transparent;
    }
    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .actions {
      display: flex;
      gap: 10px;
      width: min(100%, 760px);
    }
    @media (max-width: 520px) {
      .actions { flex-direction: column; }
    }
    canvas { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <h1>행복 네 컷</h1>
    <p class="desc">4장의 사진을 촬영하면 배경 프레임에 자동으로 합성됩니다.</p>

    <section id="cameraScreen" class="screen active">
      <div class="card">
        <div class="camera-grid">
          <div>
            <div class="video-box">
              <div id="modeBadge" class="badge">수동 촬영</div>
              <video id="video" autoplay playsinline muted></video>
              <div id="countOverlay" class="count">3</div>
            </div>
            <div id="errorBox" class="error"></div>
          </div>

          <div class="side">
            <div class="card" style="padding:14px; box-shadow:none;">
              <h2 class="panel-title">촬영 방식</h2>
              <button class="btn btn-mode active" data-mode="manual">수동 촬영</button>
              <button class="btn btn-mode" data-mode="1">1초 자동촬영</button>
              <button class="btn btn-mode" data-mode="3">3초 자동촬영</button>
            </div>

            <div class="card" style="padding:14px; box-shadow:none;">
              <h2 class="panel-title">촬영</h2>
              <button id="captureBtn" class="btn btn-main" style="margin-bottom:8px;">사진 촬영</button>
              <button id="clearBtn" class="btn btn-sub">촬영 초기화</button>
            </div>

            <div class="info">
              현재 촬영 수: <strong><span id="shotCount">0</span> / 4</strong><br />
              선택 모드: <strong><span id="modeText">수동 촬영</span></strong><br />
              4장이 촬영되면 자동으로 편집 화면으로 이동합니다.
            </div>
          </div>
        </div>

        <h2 class="thumbs-title">촬영된 사진</h2>
        <div id="thumbs" class="thumbs"></div>
      </div>
    </section>

    <section id="editorScreen" class="screen">
      <div class="card editor-wrap">
        <div id="previewStage" class="preview-stage">
          <div id="photoLayer" class="photo-layer"></div>
          <img id="frameLayer" class="frame-layer" src="background.png" alt="행복 네 컷 배경" />
        </div>

        <div class="actions">
          <button id="downloadBtn" class="btn btn-main">이미지 다운로드</button>
          <button id="retakeBtn" class="btn btn-sub">다시 촬영</button>
        </div>
      </div>
    </section>
  </div>

  <canvas id="captureCanvas"></canvas>

  <script>
    /************************************************************
     * 핵심 수정 사항
     * 기존 좌표는 실제 투명 슬롯보다 오른쪽/위쪽으로 어긋나서
     * 왼쪽에 검정 여백이 보였습니다.
     * 아래 좌표는 background.png의 실제 투명 구멍을 기준으로 다시 측정한 값입니다.
     ************************************************************/

    // 기준 배경 크기: 현재 background.png 원본 크기
    const BASE_W = 1448;
    const BASE_H = 2048;

    // 실제 투명 슬롯 위치. 단위: px, 순서: 왼쪽 위, 왼쪽 아래, 오른쪽 위, 오른쪽 아래
    const RAW_SLOTS = [
      { x: 81,  y: 450,  w: 609, h: 740 },
      { x: 80,  y: 1226, w: 606, h: 743 },
      { x: 770, y: 91,   w: 609, h: 740 },
      { x: 769, y: 863,  w: 609, h: 742 },
    ];

    // 슬롯보다 사진을 조금 더 크게 깔아 배경이 마스크처럼 덮게 합니다.
    // 이렇게 하면 1~2px 오차나 반투명 가장자리 때문에 검정 여백이 생기지 않습니다.
    const OVERFILL_PX = 10;

    const video = document.getElementById("video");
    const captureBtn = document.getElementById("captureBtn");
    const clearBtn = document.getElementById("clearBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const modeButtons = document.querySelectorAll(".btn-mode");
    const modeBadge = document.getElementById("modeBadge");
    const modeText = document.getElementById("modeText");
    const shotCount = document.getElementById("shotCount");
    const thumbs = document.getElementById("thumbs");
    const countOverlay = document.getElementById("countOverlay");
    const errorBox = document.getElementById("errorBox");
    const cameraScreen = document.getElementById("cameraScreen");
    const editorScreen = document.getElementById("editorScreen");
    const previewStage = document.getElementById("previewStage");
    const photoLayer = document.getElementById("photoLayer");
    const frameLayer = document.getElementById("frameLayer");
    const captureCanvas = document.getElementById("captureCanvas");
    const capCtx = captureCanvas.getContext("2d");

    const bgImage = new Image();
    bgImage.src = "background.png";

    let stream = null;
    let shots = [];
    let currentMode = "manual";
    let isCapturing = false;

    function getSlotWithOverfill(slot) {
      return {
        x: slot.x - OVERFILL_PX,
        y: slot.y - OVERFILL_PX,
        w: slot.w + OVERFILL_PX * 2,
        h: slot.h + OVERFILL_PX * 2,
      };
    }

    function slotToPercent(slot) {
      const s = getSlotWithOverfill(slot);
      return {
        left: (s.x / BASE_W) * 100,
        top: (s.y / BASE_H) * 100,
        width: (s.w / BASE_W) * 100,
        height: (s.h / BASE_H) * 100,
      };
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("show");
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.classList.remove("show");
    }

    function modeLabel() {
      return currentMode === "manual" ? "수동 촬영" : `${currentMode}초 자동촬영`;
    }

    function updateUI() {
      shotCount.textContent = shots.length;
      modeBadge.textContent = modeLabel();
      modeText.textContent = modeLabel();
      captureBtn.textContent = currentMode === "manual" ? "사진 촬영" : "자동촬영 시작";
      renderThumbs();
    }

    function renderThumbs() {
      thumbs.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const box = document.createElement("div");
        box.className = "thumb";
        if (shots[i]) {
          const img = document.createElement("img");
          img.src = shots[i];
          img.alt = `${i + 1}번 사진`;
          box.appendChild(img);
        } else {
          box.textContent = `${i + 1}번`;
        }
        thumbs.appendChild(box);
      }
    }

    async function startCamera() {
      hideError();
      stopCamera();
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 1600 },
            aspectRatio: { ideal: 609 / 740 },
          },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        console.error(err);
        showError("카메라를 사용할 수 없습니다. 카메라 권한을 허용했는지 확인해 주세요. GitHub Pages처럼 HTTPS 환경에서 실행하는 것이 좋습니다.");
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    function setMode(mode) {
      if (isCapturing) return;
      currentMode = mode;
      modeButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));
      updateUI();
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function countdown(sec) {
      for (let i = sec; i >= 1; i--) {
        countOverlay.textContent = i;
        countOverlay.classList.add("show");
        await wait(1000);
      }
      countOverlay.classList.remove("show");
    }

    function capturePhoto() {
      if (!video.videoWidth || !video.videoHeight) {
        showError("카메라 영상이 아직 준비되지 않았습니다. 잠시 후 다시 시도해 주세요.");
        return null;
      }

      // 슬롯 비율과 같은 사진으로 저장합니다.
      // 기존처럼 카메라 원본 전체를 그대로 저장하면 기기 회전/비율 차이로 검정 여백이 들어갈 수 있습니다.
      const targetW = 900;
      const targetH = Math.round(targetW * 740 / 609);
      captureCanvas.width = targetW;
      captureCanvas.height = targetH;

      drawVideoCover(capCtx, video, targetW, targetH);
      return captureCanvas.toDataURL("image/png");
    }

    // video를 object-fit: cover처럼 캔버스에 꽉 채워 그립니다.
    function drawVideoCover(ctx, sourceVideo, destW, destH) {
      const sourceW = sourceVideo.videoWidth;
      const sourceH = sourceVideo.videoHeight;
      const sourceRatio = sourceW / sourceH;
      const destRatio = destW / destH;

      let sx, sy, sw, sh;
      if (sourceRatio > destRatio) {
        sh = sourceH;
        sw = sh * destRatio;
        sx = (sourceW - sw) / 2;
        sy = 0;
      } else {
        sw = sourceW;
        sh = sw / destRatio;
        sx = 0;
        sy = (sourceH - sh) / 2;
      }

      ctx.clearRect(0, 0, destW, destH);
      ctx.drawImage(sourceVideo, sx, sy, sw, sh, 0, 0, destW, destH);
    }

    async function handleCapture() {
      if (isCapturing || shots.length >= 4) return;
      const photo = capturePhoto();
      if (!photo) return;
      shots.push(photo);
      updateUI();
      if (shots.length === 4) openEditor();
    }

    async function handleAutoCapture(intervalSec) {
      if (isCapturing || shots.length >= 4) return;
      isCapturing = true;
      captureBtn.disabled = true;
      clearBtn.disabled = true;
      modeButtons.forEach(btn => btn.disabled = true);

      try {
        while (shots.length < 4) {
          await countdown(intervalSec);
          const photo = capturePhoto();
          if (!photo) break;
          shots.push(photo);
          updateUI();
        }
        if (shots.length === 4) openEditor();
      } finally {
        isCapturing = false;
        captureBtn.disabled = false;
        clearBtn.disabled = false;
        modeButtons.forEach(btn => btn.disabled = false);
        countOverlay.classList.remove("show");
      }
    }

    function openEditor() {
      cameraScreen.classList.remove("active");
      editorScreen.classList.add("active");
      stopCamera();
      buildPreview();
    }

    function openCamera() {
      editorScreen.classList.remove("active");
      cameraScreen.classList.add("active");
      startCamera();
    }

    function resetShots() {
      shots = [];
      updateUI();
    }

    function buildPreview() {
      photoLayer.innerHTML = "";

      if (bgImage.naturalWidth && bgImage.naturalHeight) {
        previewStage.style.aspectRatio = `${bgImage.naturalWidth} / ${bgImage.naturalHeight}`;
      }

      RAW_SLOTS.forEach((slot, index) => {
        const p = slotToPercent(slot);
        const box = document.createElement("div");
        box.className = "slot";
        box.style.left = `${p.left}%`;
        box.style.top = `${p.top}%`;
        box.style.width = `${p.width}%`;
        box.style.height = `${p.height}%`;

        const img = document.createElement("img");
        img.src = shots[index];
        img.alt = `${index + 1}번 사진`;
        box.appendChild(img);
        photoLayer.appendChild(box);
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawImageCover(ctx, img, x, y, w, h) {
      const imgRatio = img.width / img.height;
      const boxRatio = w / h;
      let sx, sy, sw, sh;

      if (imgRatio > boxRatio) {
        sh = img.height;
        sw = sh * boxRatio;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = sw / boxRatio;
        sx = 0;
        sy = (img.height - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    async function downloadImage() {
      if (!bgImage.complete || !bgImage.naturalWidth) {
        alert("background.png를 아직 불러오지 못했습니다.");
        return;
      }

      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = bgImage.naturalWidth;
      finalCanvas.height = bgImage.naturalHeight;
      const ctx = finalCanvas.getContext("2d");

      const scaleX = bgImage.naturalWidth / BASE_W;
      const scaleY = bgImage.naturalHeight / BASE_H;

      // 1. 사진을 먼저 그립니다. 프레임보다 살짝 크게 그려 검정 틈을 없앱니다.
      for (let i = 0; i < RAW_SLOTS.length; i++) {
        const src = shots[i];
        if (!src) continue;
        const img = await loadImage(src);
        const s = getSlotWithOverfill(RAW_SLOTS[i]);
        drawImageCover(
          ctx,
          img,
          s.x * scaleX,
          s.y * scaleY,
          s.w * scaleX,
          s.h * scaleY
        );
      }

      // 2. 배경 프레임을 위에 덮어 투명 슬롯으로만 사진이 보이게 합니다.
      ctx.drawImage(bgImage, 0, 0, finalCanvas.width, finalCanvas.height);

      const link = document.createElement("a");
      link.href = finalCanvas.toDataURL("image/png");
      link.download = `행복네컷_${timestamp()}.png`;
      link.click();
    }

    function timestamp() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mi = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      return `${yyyy}${mm}${dd}_${hh}${mi}${ss}`;
    }

    modeButtons.forEach(btn => {
      btn.addEventListener("click", () => setMode(btn.dataset.mode));
    });

    captureBtn.addEventListener("click", () => {
      hideError();
      if (currentMode === "manual") handleCapture();
      else handleAutoCapture(Number(currentMode));
    });

    clearBtn.addEventListener("click", () => {
      if (!isCapturing) resetShots();
    });

    retakeBtn.addEventListener("click", () => {
      resetShots();
      openCamera();
    });

    downloadBtn.addEventListener("click", downloadImage);

    bgImage.onload = () => {
      previewStage.style.aspectRatio = `${bgImage.naturalWidth} / ${bgImage.naturalHeight}`;
    };

    window.addEventListener("load", () => {
      updateUI();
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError("이 브라우저는 카메라 기능을 지원하지 않습니다.");
        return;
      }
      startCamera();
    });

    window.addEventListener("beforeunload", stopCamera);
  </script>
</body>
</html>
